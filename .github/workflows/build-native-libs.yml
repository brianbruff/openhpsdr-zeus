name: Build Native WDSP Libraries

on:
  workflow_dispatch:
  push:
    # Branch scope (not tags): tag pushes don't honor `paths` filters reliably
    # — a brand-new tag has no "before" SHA, so every path looks like it just
    # appeared and the filter matches everything. Restricting to branches
    # keeps tag pushes (e.g. v0.1.0) out of this workflow entirely.
    branches: [main, develop]
    paths:
      - 'native/**'
      - '.github/workflows/build-native-libs.yml'

jobs:
  build-windows:
    name: Build Windows Native Libraries
    runs-on: windows-latest
    strategy:
      matrix:
        # arm64 enabled: the _MM_SET_FLUSH_ZERO_MODE SSE-intrinsic block in
        # channel.c is now gated out for ARM64 alongside linux/APPLE, so the
        # rest of WDSP compiles cleanly under VS 2022's ARM64 toolset. CMake
        # picks `-A ARM64` below, vcpkg uses the `arm64-windows-static-md`
        # triplet, and dumpbin (a host-arch tool) reads the ARM64 PE fine.
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install FFTW via vcpkg
        run: |
          # CRT linkage is per-arch:
          #
          # x64 uses the static-md triplet — FFTW is linked statically into
          # wdsp.dll, but the resulting DLL still imports the dynamic CRT
          # (vcruntime140.dll, ucrtbase.dll). On x64 boxes vcruntime140.dll
          # is effectively ubiquitous (Office, Steam, .NET SDK, the bulk of
          # Windows installer programs all ship the VC++ Redistributable),
          # so this is fine and matches the choice that has been working
          # for x64 for the entire Zeus 0.x line.
          #
          # arm64 uses the static triplet — FFTW *and* the CRT are linked
          # into wdsp.dll (matched on the CMake side by
          # CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded). Win-ARM does NOT
          # ship the ARM64 VC++ Redistributable by default and a fresh
          # Surface Pro X / Snapdragon X Elite system has no other
          # ARM64 native software to drag it in. With the static-md
          # triplet the resulting wdsp.dll loads VCRUNTIME140.dll at
          # runtime and we ship to a "module could not be found" error
          # the first time anything in WdspNativeLoader tries to open a
          # channel. The static-CRT build has zero non-Windows-shipped
          # imports — verified locally with llvm-objdump.
          $triplet = if ("${{ matrix.arch }}" -eq "arm64") {
            "arm64-windows-static"
          } else {
            "x64-windows-static-md"
          }
          vcpkg install fftw3:$triplet
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: |
          $archFlag = if ("${{ matrix.arch }}" -eq "arm64") { "ARM64" } else { "x64" }
          # Recompute the triplet here rather than passing it through
          # GITHUB_ENV. Step-to-step env var hand-off via PowerShell's
          # `>> $env:GITHUB_ENV` has been finicky on windows-latest (the
          # var lands but evaluates empty in the next step), and the
          # derivation is short. Must stay in sync with the FFTW step.
          $triplet = if ("${{ matrix.arch }}" -eq "arm64") {
            "arm64-windows-static"
          } else {
            "x64-windows-static-md"
          }
          # ClangCL toolset: the vendored libspecbleach source uses a C99
          # variable-length array in get_rolling_median_spectrum which MSVC
          # does not implement. clang-cl supports VLAs and ships with the
          # Visual Studio installation on the GitHub windows-latest runner;
          # it uses the MSVC ABI so the resulting wdsp.dll stays binary-
          # compatible with anything else built by MSVC. This matches what
          # MW0LGE almost certainly used to produce the pre-built
          # specbleach.dll committed to the Thetis tree (Thetis itself
          # never rebuilds libspecbleach in CI). No vendored source patch
          # is required.
          #
          # WDSP_WITH_NR4=ON pulls in native/libspecbleach/ as a STATIC sub-
          # target embedded into wdsp.dll. NR3 stays OFF (librnnoise not
          # vendored). Both flags are explicit for build-log clarity.
          #
          # arm64 also passes CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded so
          # WDSP itself is built with /MT, matching the static-CRT FFTW
          # produced by the arm64-windows-static vcpkg triplet. Without
          # this match the link step trips LNK2038 ("mismatch detected
          # for 'RuntimeLibrary'") because vcpkg's libfftw3-3.lib expects
          # /MT and CMake's MSVC default is /MD. See the FFTW step above
          # for why arm64 needs static CRT in the first place.
          #
          # Build the cmake invocation as a single array and splat it
          # via `& cmake @cmakeArgs`. Earlier attempts used backtick
          # line-continuation with a trailing `@extraArgs` splat, which
          # PowerShell on windows-latest mangled — a single-element
          # array containing "-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"
          # arrived at cmake as multiple tokens including a stray "d"
          # and a bare "-". Building one array end-to-end avoids the
          # whole continuation-plus-splat parsing footgun.
          $cmakeArgs = @(
            '-S', 'native/wdsp',
            '-B', 'native/build',
            '-G', 'Visual Studio 17 2022',
            '-A', $archFlag,
            '-T', 'ClangCL',
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake",
            "-DVCPKG_TARGET_TRIPLET=$triplet",
            '-DWDSP_WITH_NR3=OFF',
            '-DWDSP_WITH_NR4=ON'
          )
          if ("${{ matrix.arch }}" -eq "arm64") {
            $cmakeArgs += '-DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded'
          }
          Write-Host "cmake args:"; $cmakeArgs | ForEach-Object { Write-Host "  $_" }
          & cmake @cmakeArgs

      - name: Build
        run: |
          cmake --build native/build --config Release --parallel

      - name: Verify SBNR exports
        run: |
          # Phase 1 of issue #162: confirm the rebuild actually picks up the
          # libspecbleach-backed sbnr.c (8 SetRXASBNR* exports). If this fails
          # the build is silently stub-based and NR4 won't work at runtime.
          #
          # dumpbin lives inside the MSVC toolset and isn't on PATH outside a
          # developer shell. vswhere is on every windows-latest runner image
          # at a fixed path; use it to locate the latest VS install and pick
          # the highest-versioned x64-host dumpbin under VC\Tools\MSVC.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vswhere -latest -property installationPath
          $dumpbin = Get-ChildItem -Path "$vsInstall\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" |
                     Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) { throw "dumpbin.exe not found under $vsInstall\VC\Tools\MSVC" }
          Write-Host "Using dumpbin: $dumpbin"
          $exports = & $dumpbin /EXPORTS native/build/Release/wdsp.dll | Select-String "SetRXASBNR"
          $count = ($exports | Measure-Object).Count
          Write-Host "Found $count SetRXASBNR* exports:"
          $exports
          if ($count -ne 8) {
            throw "Expected 8 SetRXASBNR* exports, got $count. NR4 did not link correctly."
          }

      - name: Stage DLL
        run: |
          $rid = "win-${{ matrix.arch }}"
          $destDir = "Zeus.Dsp/runtimes/$rid/native"
          New-Item -ItemType Directory -Force -Path $destDir
          Copy-Item "native/build/Release/wdsp.dll" "$destDir/wdsp.dll"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wdsp-windows-${{ matrix.arch }}
          path: Zeus.Dsp/runtimes/win-${{ matrix.arch }}/native/wdsp.dll

  build-linux:
    name: Build Linux Native Libraries
    # Pinned to ubuntu-22.04 (glibc 2.35) so libwdsp.so loads on Ubuntu 22.04,
    # Debian 12, RHEL 9 and equivalents. ubuntu-latest moved to 24.04 (glibc
    # 2.39) and produced binaries that fail with `version GLIBC_2.38 not
    # found` on every older distro. Do NOT bump this without a deliberate
    # decision to drop those users — same applies to the arm64 cross-compile
    # below, whose aarch64 sysroot comes from this host's apt.
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (x64)
        if: matrix.arch == 'x64'
        run: |
          # libfftw3-dev ships both fftw3 (double, for WDSP) and fftw3f
          # (single, for libspecbleach / NR4) in the same package — no
          # extra dependency needed for NR4.
          sudo apt-get update
          sudo apt-get install -y libfftw3-dev cmake build-essential pkg-config

      - name: Install cross-compilation tools (arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake pkg-config

          # Cross-compile FFTW3 (double precision) for arm64. We deliberately
          # do NOT cross-compile FFTW3f (single precision) here — the arm64
          # job is configured with WDSP_WITH_NR4=OFF below, so libspecbleach
          # isn't needed. Building FFTW twice would double the cross-compile
          # time for a binary that doesn't currently ship NR4 anyway. NR4 on
          # linux-arm64 is a Phase 1f follow-up under #162.
          wget http://www.fftw.org/fftw-3.3.10.tar.gz
          tar xzf fftw-3.3.10.tar.gz
          cd fftw-3.3.10
          ./configure --host=aarch64-linux-gnu --prefix=$HOME/fftw-arm64 \
            CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ \
            --enable-shared --disable-static
          make -j$(nproc)
          make install
          cd ..

      - name: Configure CMake (x64)
        if: matrix.arch == 'x64'
        run: |
          # WDSP_WITH_NR4=ON pulls in native/libspecbleach/ as a STATIC sub-
          # target embedded into libwdsp.so. NR3 stays OFF (librnnoise not
          # vendored). Both flags are explicit for build-log clarity.
          cmake -S native/wdsp -B native/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DWDSP_WITH_NR3=OFF \
            -DWDSP_WITH_NR4=ON

      - name: Configure CMake (arm64)
        if: matrix.arch == 'arm64'
        run: |
          # WDSP_WITH_NR4=OFF on arm64 — see "Install cross-compilation tools"
          # above. linux-arm64 NR4 is a Phase 1f follow-up under #162.
          cmake -S native/wdsp -B native/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DWDSP_WITH_NR3=OFF \
            -DWDSP_WITH_NR4=OFF \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH=$HOME/fftw-arm64 \
            -DCMAKE_PREFIX_PATH=$HOME/fftw-arm64

      - name: Build
        run: |
          cmake --build native/build --config Release --parallel

      - name: Verify SBNR exports (x64)
        if: matrix.arch == 'x64'
        run: |
          # Phase 1 of issue #162: confirm the rebuild actually picks up the
          # libspecbleach-backed sbnr.c (8 SetRXASBNR* exports). If this fails
          # the build is silently stub-based and NR4 won't work at runtime.
          count=$(nm -D native/build/libwdsp.so | grep -c "SetRXASBNR" || true)
          echo "Found $count SetRXASBNR* exports:"
          nm -D native/build/libwdsp.so | grep "SetRXASBNR" || true
          if [ "$count" -ne 8 ]; then
            echo "ERROR: Expected 8 SetRXASBNR* exports, got $count. NR4 did not link correctly."
            exit 1
          fi

      - name: Stage library
        run: |
          rid="linux-${{ matrix.arch }}"
          destDir="Zeus.Dsp/runtimes/$rid/native"
          mkdir -p "$destDir"
          cp native/build/libwdsp.so "$destDir/libwdsp.so"

      - name: Bundle FFTW3 alongside libwdsp.so (x64)
        if: matrix.arch == 'x64'
        run: |
          # Ship the FFTW3 dynamic libs in the tarball so the launcher's
          # LD_LIBRARY_PATH (set in installers/create-linux-package.sh to
          # runtimes/linux-x64/native/) finds them and the user does NOT need
          # libfftw3 installed system-wide. readlink -f resolves the SONAME
          # symlink so we copy the real .so file, then rename it back to the
          # SONAME filename libwdsp.so was linked against.
          set -eux
          destDir="Zeus.Dsp/runtimes/linux-x64/native"
          for soname in libfftw3.so.3 libfftw3f.so.3; do
            src=$(readlink -f "/usr/lib/x86_64-linux-gnu/$soname")
            test -f "$src"
            cp "$src" "$destDir/$soname"
          done
          ls -la "$destDir/"
          ldd "$destDir/libwdsp.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wdsp-linux-${{ matrix.arch }}
          # Directory upload (not a single file) so the bundled FFTW .so.3
          # files in the x64 build land in the artifact alongside libwdsp.so.
          path: Zeus.Dsp/runtimes/linux-${{ matrix.arch }}/native/

  commit-libraries:
    name: Commit Native Libraries
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage all libraries
        run: |
          # Each artifact's root contains the runtime files staged by its
          # build job — a single .dll/.so for windows / linux-arm64, plus the
          # bundled libfftw3.so.3 / libfftw3f.so.3 for linux-x64. Copy whole
          # contents into the matching runtimes/<rid>/native/ destination
          # rather than picking out a single file by name.
          set -eux
          for artifact_dir in artifacts/wdsp-*; do
            artifact_name=$(basename "$artifact_dir")  # e.g. wdsp-windows-x64
            case "$artifact_name" in
              wdsp-windows-x64)   destDir=Zeus.Dsp/runtimes/win-x64/native ;;
              wdsp-windows-arm64) destDir=Zeus.Dsp/runtimes/win-arm64/native ;;
              wdsp-linux-x64)     destDir=Zeus.Dsp/runtimes/linux-x64/native ;;
              wdsp-linux-arm64)   destDir=Zeus.Dsp/runtimes/linux-arm64/native ;;
              *)
                echo "Unrecognised artifact $artifact_name — refusing to guess destination" >&2
                exit 1
                ;;
            esac
            mkdir -p "$destDir"
            cp -p "$artifact_dir"/* "$destDir/"
          done

      - name: Open or update auto-PR with rebuilt libraries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Branch protection on main blocks direct pushes by github-actions[bot]
          # (GH006 "Changes must be made through a pull request"). Push to a
          # stable bot branch and open / refresh a PR there instead — re-runs
          # force-push and update the existing PR rather than spawning new ones.
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Zeus.Dsp/runtimes/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          branch="auto/native-libs-update"
          git checkout -b "$branch"
          git commit -m "build: update native WDSP libraries for Windows and Linux"
          # Force-push so re-runs replace the bot branch in place.
          git push --force origin "$branch"

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')" ]; then
            echo "PR already open for $branch — branch updated by force-push"
          else
            body=$(printf '%s\n\n%s\n\n%s\n' \
              "Automated rebuild of native WDSP libraries from [build-native-libs run]($run_url)." \
              "Merge after sanity-checking the staged binaries (size, ldd, dumpbin /EXPORTS, etc)." \
              "The bot will force-push this branch on every native-libs rebuild — re-runs reuse this PR rather than opening a new one.")
            gh pr create \
              --base main --head "$branch" \
              --title "build: update native WDSP libraries (auto)" \
              --body "$body"
          fi
