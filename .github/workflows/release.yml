name: Release

# Four trigger paths:
#   1. push of a v*.*.* tag                 → full release (build + publish to GitHub Releases)
#   2. push to a release/** branch          → dry-run build only (artifacts uploaded, no Release)
#   3. manual workflow_dispatch (draft=off) → dry-run build only (run from any branch via the
#                                             Actions tab → Release → Run workflow)
#   4. manual workflow_dispatch (draft=on)  → DRAFT GitHub Release (maintainers only). Same
#                                             VersionPrefix as the eventual public release —
#                                             no -dryrun.<sha> suffix on artifact names — so
#                                             the bits you smoke-test are byte-for-byte what
#                                             would ship if you flip the draft to "Published".
#
# In all four modes the same matrix builds installers for Windows, Linux,
# and macOS — both the headless service-mode bundles AND the Photino
# desktop bundles. 'create-release' is gated on is-release='true', which is
# set by the determine-version step in modes 1 and 4 only.
on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as a DRAFT GitHub Release (visible only to maintainers, version not suffixed with -dryrun.<sha>). Leave unchecked for a regular dry-run that only uploads artifacts to the run page.'
        type: boolean
        required: false
        default: false

jobs:
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      # Full SemVer string used in artifact filenames (e.g. 0.4.1-dryrun.abc1234).
      version: ${{ steps.parse.outputs.version }}
      # Numeric MAJOR.MINOR.PATCH for -p:VersionPrefix. .NET's AssemblyVersion /
      # FileVersion are derived from this in Directory.Build.props and reject
      # any non-numeric content (CS7034 / CS7035), so the suffix has to ride on
      # VersionSuffix instead.
      version-prefix: ${{ steps.parse.outputs.version-prefix }}
      version-suffix: ${{ steps.parse.outputs.version-suffix }}
      is-release: ${{ steps.parse.outputs.is-release }}
      is-draft: ${{ steps.parse.outputs.is-draft }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version + validate (tag mode only)
        id: parse
        env:
          # workflow_dispatch boolean inputs arrive as the strings "true"/"false";
          # plumb through env so the bash conditional below stays readable.
          DISPATCH_DRAFT: ${{ github.event.inputs.draft }}
        run: |
          IS_DRAFT="false"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            # Tag push — strict release path.
            if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Tag '$GITHUB_REF_NAME' does not match vMAJOR.MINOR.PATCH (e.g. v1.2.3)."
              exit 1
            fi
            git fetch origin main --depth=0 2>/dev/null || git fetch origin main
            TAG_SHA=$(git rev-parse "$GITHUB_REF_NAME^{commit}")
            if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
              echo "::error::Tag '$GITHUB_REF_NAME' (commit $TAG_SHA) is not reachable from origin/main. Releases must be tagged from main."
              exit 1
            fi
            VERSION_PREFIX="${GITHUB_REF_NAME#v}"
            VERSION_SUFFIX=""
            VERSION="$VERSION_PREFIX"
            IS_RELEASE="true"
            echo "Tagged release $GITHUB_REF_NAME → version $VERSION"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$DISPATCH_DRAFT" == "true" ]]; then
            # Manual dispatch with draft=true — produce a DRAFT GitHub Release
            # using the in-tree VersionPrefix verbatim. No -dryrun.<sha> suffix:
            # the artifact filenames you smoke-test must match the eventual
            # published release byte-for-byte. The draft is only visible to
            # maintainers until someone clicks "Publish release".
            VERSION_PREFIX=$(sed -n 's:.*<VersionPrefix[^>]*>\([^<]*\)</VersionPrefix>.*:\1:p' Directory.Build.props | head -1)
            VERSION_PREFIX="${VERSION_PREFIX:-0.0.0}"
            VERSION_SUFFIX=""
            VERSION="$VERSION_PREFIX"
            IS_RELEASE="true"
            IS_DRAFT="true"
            echo "Draft release dispatch (ref=$GITHUB_REF) → version $VERSION (draft=true)"
          else
            # Branch push or manual dispatch (draft=false) — dry-run path. Read
            # VersionPrefix from Directory.Build.props and ride the dryrun.<sha>
            # tag on VersionSuffix so .NET's AssemblyVersion (which is built
            # from VersionPrefix only) stays a valid MAJOR.MINOR.PATCH.
            VERSION_PREFIX=$(sed -n 's:.*<VersionPrefix[^>]*>\([^<]*\)</VersionPrefix>.*:\1:p' Directory.Build.props | head -1)
            VERSION_PREFIX="${VERSION_PREFIX:-0.0.0}"
            SHORT_SHA="${GITHUB_SHA:0:7}"
            VERSION_SUFFIX="dryrun.${SHORT_SHA}"
            VERSION="${VERSION_PREFIX}-${VERSION_SUFFIX}"
            IS_RELEASE="false"
            echo "Dry-run build (trigger=$GITHUB_EVENT_NAME ref=$GITHUB_REF) → version $VERSION"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version-prefix=${VERSION_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "version-suffix=${VERSION_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "is-release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "is-draft=${IS_DRAFT}" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build (${{ matrix.config.os }})
    needs: determine-version
    runs-on: ${{ matrix.config.runner }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows
            runner: windows-latest
            rid: win-x64
            arch: x64
            artifact: windows-installer
            desktop_artifact: windows-desktop-installer
          # Windows-on-ARM. Cross-published from the x64 windows-latest host —
          # .NET 10 emits win-arm64 binaries from any host arch, and Inno Setup
          # iscc on x64 produces an installer that targets ARM64 fine. Keeping
          # the runner pinned to windows-latest (rather than windows-11-arm)
          # avoids native-tooling drift between the two arches.
          - os: windows
            runner: windows-latest
            rid: win-arm64
            arch: arm64
            artifact: windows-arm64-installer
            desktop_artifact: windows-arm64-desktop-installer
          - os: linux
            # Pinned to ubuntu-22.04 (glibc 2.35) — the self-contained .NET
            # publish embeds native runtime libs that link against the build
            # host's glibc, so building on ubuntu-latest (24.04, glibc 2.39)
            # produces a tarball that fails on Ubuntu 22.04 / Debian 12 / RHEL
            # 9 with `version GLIBC_2.38 not found`. Match build-native-libs.yml.
            runner: ubuntu-22.04
            rid: linux-x64
            artifact: linux-tarball
            desktop_artifact: linux-desktop-appimage
          - os: macos-arm64
            runner: macos-latest  # Apple Silicon
            rid: osx-arm64
            artifact: macos-arm64-dmg
            desktop_artifact: macos-arm64-desktop-dmg

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zeus-web/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: zeus-web

      - name: Publish Zeus.Server (service mode)
        # Force bash so the backslash line-continuations parse correctly on
        # windows-latest, where the default shell is PowerShell (which
        # treats `--self-contained \` as a unary operator and errors out).
        # VersionPrefix stays numeric (consumed by AssemblyVersion); the
        # text suffix rides on VersionSuffix and lands in InformationalVersion.
        shell: bash
        run: |
          dotnet publish Zeus.Server/Zeus.Server.csproj \
            -c Release \
            -r ${{ matrix.config.rid }} \
            --self-contained true \
            -p:PublishReadyToRun=true \
            -p:VersionPrefix=${{ needs.determine-version.outputs.version-prefix }} \
            -p:VersionSuffix=${{ needs.determine-version.outputs.version-suffix }} \
            -p:DebugType=embedded \
            -p:DebugSymbols=false

      - name: Publish Zeus.Desktop (desktop mode)
        # Same self-contained publish as Zeus.Server, but for the Photino shell.
        # Per-installer scripts (Windows .iss, Linux AppImage, macOS .app) all
        # consume this output dir directly. The macOS desktop script does its
        # own `dotnet publish` internally as a fallback for local use; running
        # publish here makes it idempotent on this runner.
        shell: bash
        run: |
          dotnet publish Zeus.Desktop/Zeus.Desktop.csproj \
            -c Release \
            -r ${{ matrix.config.rid }} \
            --self-contained true \
            -p:PublishReadyToRun=true \
            -p:VersionPrefix=${{ needs.determine-version.outputs.version-prefix }} \
            -p:VersionSuffix=${{ needs.determine-version.outputs.version-suffix }} \
            -p:DebugType=embedded \
            -p:DebugSymbols=false

      # ---------- Service-mode installers (existing flow) -----------------

      - name: Build Windows Installer (Inno Setup)
        if: matrix.config.os == 'windows'
        shell: pwsh
        run: |
          choco install innosetup -y
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          iscc /DMyAppVersion="${{ steps.version.outputs.version }}" /DArch="${{ matrix.config.arch }}" installers\zeus-windows.iss

      - name: Upload Windows Installer
        if: matrix.config.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: installers/output/Zeus-${{ steps.version.outputs.version }}-win-${{ matrix.config.arch }}-setup.exe
          if-no-files-found: error

      - name: Build Linux Package
        if: matrix.config.os == 'linux'
        run: |
          chmod +x installers/create-linux-package.sh
          installers/create-linux-package.sh ${{ steps.version.outputs.version }}

      - name: Upload Linux Package
        if: matrix.config.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: installers/output/zeus-${{ steps.version.outputs.version }}-linux-x64.tar.gz
          if-no-files-found: error

      - name: Build macOS Package
        if: startsWith(matrix.config.os, 'macos')
        run: |
          chmod +x installers/create-macos-app.sh
          ARCH="${{ matrix.config.rid == 'osx-arm64' && 'arm64' || 'x64' }}"
          installers/create-macos-app.sh ${{ steps.version.outputs.version }} $ARCH

      - name: Upload macOS Package
        if: startsWith(matrix.config.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: installers/output/Zeus-${{ steps.version.outputs.version }}-macos-*.dmg
          if-no-files-found: error

      # ---------- Desktop-mode installers (Photino in-process) ------------

      - name: Build Windows Desktop Installer (Inno Setup)
        if: matrix.config.os == 'windows'
        shell: pwsh
        run: |
          # Inno Setup was already installed by the service-mode step on the
          # same runner; this just adds the binary to PATH and runs iscc again
          # against the desktop .iss.
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          iscc /DMyAppVersion="${{ steps.version.outputs.version }}" /DArch="${{ matrix.config.arch }}" installers\zeus-desktop-windows.iss

      - name: Upload Windows Desktop Installer
        if: matrix.config.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.desktop_artifact }}
          path: installers/output/Zeus-Desktop-${{ steps.version.outputs.version }}-win-${{ matrix.config.arch }}-setup.exe
          if-no-files-found: error

      - name: Build Linux Desktop AppImage
        if: matrix.config.os == 'linux'
        run: |
          # appimagetool fetched on-demand by the script. We pass
          # --appimage-extract-and-run inside the script so FUSE2 isn't
          # required on the runner.
          chmod +x installers/create-linux-desktop-appimage.sh
          installers/create-linux-desktop-appimage.sh ${{ steps.version.outputs.version }}

      - name: Upload Linux Desktop AppImage
        if: matrix.config.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.desktop_artifact }}
          path: installers/output/Zeus-Desktop-${{ steps.version.outputs.version }}-linux-x86_64.AppImage
          if-no-files-found: error

      - name: Build macOS Desktop Package
        if: startsWith(matrix.config.os, 'macos')
        run: |
          chmod +x installers/create-macos-desktop-app.sh
          ARCH="${{ matrix.config.rid == 'osx-arm64' && 'arm64' || 'x64' }}"
          installers/create-macos-desktop-app.sh ${{ steps.version.outputs.version }} $ARCH

      - name: Upload macOS Desktop Package
        if: startsWith(matrix.config.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.desktop_artifact }}
          path: installers/output/Zeus-Desktop-${{ steps.version.outputs.version }}-macos-*.dmg
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [determine-version, build-release]
    if: needs.determine-version.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display artifact structure
        run: ls -R release-artifacts

      - name: Create Release Notes
        run: |
          cat > release-notes.md << 'EOF'
          # Zeus v${{ steps.version.outputs.version }}

          Cross-platform SDR client for OpenHPSDR Protocol-1 and Protocol-2 radios.

          ## Downloads

          ### Windows (x64)
          - **Zeus-${{ steps.version.outputs.version }}-win-x64-setup.exe** - service mode (browser UI)
          - **Zeus-Desktop-${{ steps.version.outputs.version }}-win-x64-setup.exe** - desktop edition (native Photino window)

          Both bundle the .NET 10 runtime and all dependencies. Distinct AppIds, so
          you can install both side-by-side if you want.

          ### Windows (ARM64)
          - **Zeus-${{ steps.version.outputs.version }}-win-arm64-setup.exe** - service mode (browser UI)
          - **Zeus-Desktop-${{ steps.version.outputs.version }}-win-arm64-setup.exe** - desktop edition (native Photino window)

          Windows on ARM (Surface Pro X / Snapdragon X Elite / etc.) — same Zeus,
          native ARM build. Same AppIds as the x64 installers, so installing the
          ARM build over an existing x64 install will upgrade in place.

          ### macOS (Apple Silicon)
          - **Zeus-${{ steps.version.outputs.version }}-macos-arm64.dmg** - service mode (open Zeus in your browser)
          - **Zeus-Desktop-${{ steps.version.outputs.version }}-macos-arm64.dmg** - desktop edition (native Photino window, no browser)

          Intel Mac builds are no longer published — the `macos-13` runner queue
          on GitHub-hosted Actions is too slow to be practical. If you need an
          Intel build, build from source.

          **IMPORTANT for macOS users**: After installation, you must remove the quarantine attribute:
          ```bash
          xattr -cr /Applications/Zeus.app
          ```
          This is required because Zeus is not signed by a registered Apple Developer.

          ### Linux (x64)
          - **zeus-${{ steps.version.outputs.version }}-linux-x64.tar.gz** - service mode tarball (browser UI)
            - Extract and run `./zeus`. Self-contained .NET runtime + statically-embedded FFTW3.
          - **Zeus-Desktop-${{ steps.version.outputs.version }}-linux-x86_64.AppImage** - desktop edition (native Photino window)
            - `chmod +x` and run. Requires `libwebkit2gtk-4.1-0` (`apt install` / `dnf install`).

          ## Changes

          See the [full changelog](https://github.com/brianbruff/openhpsdr-zeus/compare/...v${{ steps.version.outputs.version }}) for details.

          ## License

          GNU GPL v2 or later. See [LICENSE](https://github.com/brianbruff/openhpsdr-zeus/blob/main/LICENSE) for details.
          EOF

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Zeus v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          # Draft mode is set by determine-version when triggered via
          # workflow_dispatch with draft=true. Tag-push releases publish
          # immediately (is-draft="false" in that path).
          draft: ${{ needs.determine-version.outputs.is-draft == 'true' }}
          prerelease: false
          files: |
            release-artifacts/windows-installer/*
            release-artifacts/windows-desktop-installer/*
            release-artifacts/windows-arm64-installer/*
            release-artifacts/windows-arm64-desktop-installer/*
            release-artifacts/linux-tarball/*
            release-artifacts/linux-desktop-appimage/*
            release-artifacts/macos-arm64-dmg/*
            release-artifacts/macos-arm64-desktop-dmg/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
